global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8000']

  - job_name: 'nlu-service'
    static_configs:
      - targets: ['nlu-service:8000']

  - job_name: 'strategy-engine'
    static_configs:
      - targets: ['strategy-engine:8000']

  - job_name: 'llm-phraser'
    static_configs:
      - targets: ['llm-phraser:8000']
