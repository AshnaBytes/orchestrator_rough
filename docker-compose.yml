services:

  # =============================================
  # 🛡️ API Gateway — All external traffic enters here
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped

  # =============================================
  # 🧠 Orchestrator — Internal only (behind Nginx)
  # =============================================
  orchestrator:
    build: .
    container_name: orchestrator
    expose:
      - "8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - STRATEGY_ENGINE_URL=${STRATEGY_ENGINE_URL:-http://strategy-engine:8000}
      - LLM_PHRASER_URL=${LLM_PHRASER_URL:-http://llm-phraser:8000}
      - NLU_URL=${NLU_URL:-http://nlu-service:8000}
    depends_on:
      redis:
        condition: service_healthy
      strategy-engine:
        condition: service_healthy
      nlu-service:
        condition: service_healthy
      llm-phraser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # =============================================
  # Microservices — Internal only
  # =============================================
  strategy-engine:
    build: ./microservices/strategy-engine
    container_name: strategy-engine
    expose:
      - "8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  nlu-service:
    build: ./microservices/nlu-service
    container_name: nlu-service
    expose:
      - "8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  llm-phraser:
    build: ./microservices/llm-phraser
    container_name: llm-phraser
    expose:
      - "8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # =============================================
  # Redis
  # =============================================
  redis:
    image: redis:alpine
    container_name: redis
    expose:
      - "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
