x-logging: &loki-logging
  driver: loki
  options:
    loki-url: "http://localhost:3100/loki/api/v1/push"

services:

  # =============================================
  # 🛡️ API Gateway — All external traffic enters here
  # =============================================
  nginx:
    image: nginx:alpine
    container_name: nginx-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      orchestrator:
        condition: service_healthy
    restart: unless-stopped
    logging: *loki-logging

  # =============================================
  # 🧠 Orchestrator — Internal only (behind Nginx)
  # =============================================
  orchestrator:
    build: .
    container_name: orchestrator
    expose:
      - "8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - STRATEGY_ENGINE_URL=${STRATEGY_ENGINE_URL:-http://strategy-engine:8000}
      - LLM_PHRASER_URL=${LLM_PHRASER_URL:-http://llm-phraser:8000}
      - NLU_URL=${NLU_URL:-http://nlu-service:8000}
    depends_on:
      redis:
        condition: service_healthy
      strategy-engine:
        condition: service_healthy
      nlu-service:
        condition: service_healthy
      llm-phraser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    logging: *loki-logging

  # =============================================
  # Microservices — Internal only
  # =============================================
  strategy-engine:
    build: ./microservices/strategy-engine
    container_name: strategy-engine
    expose:
      - "8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *loki-logging

  nlu-service:
    build: ./microservices/nlu-service
    container_name: nlu-service
    expose:
      - "8000"
    environment:
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *loki-logging

  llm-phraser:
    build: ./microservices/llm-phraser
    container_name: llm-phraser
    expose:
      - "8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - INTERNAL_SERVICE_KEY=${INTERNAL_SERVICE_KEY}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    logging: *loki-logging

  # =============================================
  # Redis
  # =============================================
  redis:
    image: redis:alpine
    container_name: redis
    expose:
      - "6379"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    logging: *loki-logging

  # =============================================
  # 📊 Monitoring & Logging
  # =============================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

# Optional: Add x-logging anchor here if you want to use it across all services.
# x-logging: &default-logging
#   driver: "json-file"
#   options:
#     max-size: "10m"
#     max-file: "3"
